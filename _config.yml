title: "FEWK LOREBOOK"
description: "FEWK 세계관 로어북 — 다크 사이버펑크 아카이브"
url: "https://mejecrew-cmd.github.io"
baseurl: "/FEWKbooks"
lang: ko

permalink: pretty

collections:
  lorebook:
    output: true
    permalink: /lorebook/:path/
  characters:
    output: true
    permalink: /characters/:path/
  factions:
    output: true
    permalink: /factions/:path/
  locations:
    output: true
    permalink: /locations/:path/

defaults:
  - scope:
      path: ""
      type: "lorebook"
    values:
      layout: "entry"
  - scope:
      path: ""
      type: "characters"
    values:
      layout: "entry"
  - scope:
      path: ""
      type: "factions"
    values:
      layout: "entry"
  - scope:
      path: ""
      type: "locations"
    values:
      layout: "entry"
  - scope:
      path: ""
    values:
      layout: "default"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
